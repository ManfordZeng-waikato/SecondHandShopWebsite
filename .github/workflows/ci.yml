name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 16 * * *"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-unit:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore SecondHandShopWebsite.slnx

      - name: Build solution
        run: dotnet build SecondHandShopWebsite.slnx --no-restore --configuration Release

      - name: Run Domain unit tests
        run: dotnet test tests/SecondHandShop.Domain.UnitTests --no-build --configuration Release --verbosity normal

      - name: Run Application unit tests
        run: dotnet test tests/SecondHandShop.Application.UnitTests --no-build --configuration Release --verbosity normal

      - name: Run Infrastructure unit tests
        run: dotnet test tests/SecondHandShop.Infrastructure.UnitTests --no-build --configuration Release --verbosity normal

  backend-coverage:
    name: Backend Coverage Gate
    runs-on: ubuntu-latest
    env:
      REQUIRE_DOCKER: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Verify Docker is available
        run: docker info

      - name: Run backend coverage gate
        run: bash ./scripts/coverage.sh Release

  backend-integration:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    env:
      REQUIRE_DOCKER: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Run Infrastructure integration tests
        run: dotnet test tests/SecondHandShop.Infrastructure.IntegrationTests --verbosity normal

      - name: Run WebApi integration tests
        run: dotnet test tests/SecondHandShop.WebApi.IntegrationTests --verbosity normal

  frontend-unit:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeScript check & build
        run: npm run build

      - name: Run unit tests
        run: npm test

      - name: Run coverage
        run: npm run test:coverage

  frontend-journey:
    name: Frontend Journey Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run journey tests
        env:
          PLAYWRIGHT_MANAGED_SERVERS: "true"
          PLAYWRIGHT_SKIP_GLOBAL_SETUP: "true"
        run: npm run test:journey

  nightly-e2e:
    name: Nightly Smoke E2E
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run smoke E2E tests
        env:
          PLAYWRIGHT_BASE_URL: ${{ secrets.PLAYWRIGHT_BASE_URL }}
          PLAYWRIGHT_API_BASE_URL: ${{ secrets.PLAYWRIGHT_API_BASE_URL }}
          PLAYWRIGHT_ADMIN_USER: ${{ secrets.PLAYWRIGHT_ADMIN_USER }}
          PLAYWRIGHT_ADMIN_PASSWORD: ${{ secrets.PLAYWRIGHT_ADMIN_PASSWORD }}
        run: npm run test:e2e
